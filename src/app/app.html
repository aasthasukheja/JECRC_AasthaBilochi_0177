<div class="container">
  <h1>Angular Banking Application</h1>

  <div class="filter-section">
    <input type="date" [(ngModel)]="selectedDate">
    <button (click)="filterTransactions()">Filter</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Description</th>
        <th>Type</th>
        <th (click)="sortByAmount()" class="clickable">Amount($)</th>
        <th>Balance</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let transaction of displayedTransactions">
        <td>{{ transaction.date }}</td>
        <td>{{ transaction.description }}</td>
        <td>{{ transaction.type === 0 ? 'Credit' : 'Debit' }}</td>
        <td>{{ transaction.amount }}</td>
        <td>{{ transaction.balance }}</td>
      </tr>
    </tbody>
  </table>
</div>
